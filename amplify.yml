version: 1
backend:
  phases:
    preBuild:
      commands:
        # Tailwind 4's oxide engine requires Node >= 20; pin it from .nvmrc so the
        # CI build doesn't silently skip the native binary (npm optional-deps bug).
        - nvm install
        - nvm use
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm install
        - nvm use
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*